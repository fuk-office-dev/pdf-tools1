<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF向き修正ツール</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 8px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }

        .upload-area {
            border: 3px dashed #ccc;
            border-radius: 12px;
            padding: 50px;
            text-align: center;
            background: white;
            transition: all 0.3s;
            cursor: pointer;
        }

        .upload-area:hover,
        .upload-area.dragover {
            border-color: #007bff;
            background: #f0f8ff;
        }

        .upload-btn {
            display: inline-block;
            padding: 12px 30px;
            background: #007bff;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 15px;
            transition: background 0.2s;
        }

        .upload-btn:hover {
            background: #0056b3;
        }

        input[type="file"] {
            display: none;
        }

        .editor {
            display: none;
        }

        .toolbar {
            background: white;
            border-radius: 10px;
            padding: 15px 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .toolbar-title {
            font-weight: bold;
            color: #333;
            font-size: 15px;
        }

        .page-count {
            color: #666;
            font-size: 14px;
        }

        .bulk-controls {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-left: auto;
        }

        .bulk-label {
            font-size: 14px;
            color: #666;
        }

        .bulk-btn {
            padding: 8px 16px;
            background: #6c757d;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.2s;
        }

        .bulk-btn:hover {
            background: #5a6268;
        }

        .save-btn {
            padding: 10px 25px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }

        .save-btn:hover {
            background: #218838;
        }

        .reset-btn {
            padding: 10px 25px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        .reset-btn:hover {
            background: #c82333;
        }

        .info-box {
            background: #e7f3ff;
            border: 1px solid #b3d9ff;
            color: #004085;
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .pages-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .page-card {
            background: white;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            text-align: center;
            transition: box-shadow 0.2s;
        }

        .page-card:hover {
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
        }

        .page-card.rotated {
            border: 2px solid #28a745;
        }

        .canvas-wrapper {
            position: relative;
            display: inline-block;
            overflow: hidden;
            border-radius: 5px;
            border: 1px solid #eee;
            width: 100%;
            margin-bottom: 12px;
            background: #fafafa;
        }

        .page-canvas {
            display: block;
            width: 100%;
            height: auto;
            transition: transform 0.3s ease;
        }

        .page-label {
            font-weight: bold;
            color: #007bff;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .rotation-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            margin-bottom: 10px;
            background: #e9ecef;
            color: #666;
        }

        .rotation-badge.changed {
            background: #d4edda;
            color: #155724;
            font-weight: bold;
        }

        .btn-group {
            display: flex;
            gap: 6px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .rotate-btn {
            padding: 8px 14px;
            border: 1px solid #007bff;
            background: white;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
            color: #007bff;
            font-weight: 500;
        }

        .rotate-btn:hover {
            background: #007bff;
            color: white;
        }

        .reset-page-btn {
            padding: 6px 12px;
            color: #dc3545;
            border: 1px solid #dc3545;
            background: white;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
        }

        .reset-page-btn:hover {
            background: #dc3545;
            color: white;
        }

        .progress {
            display: none;
            margin: 20px 0;
        }

        .progress-bar {
            width: 100%;
            height: 30px;
            background: #e9ecef;
            border-radius: 8px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #007bff, #28a745);
            transition: width 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 14px;
        }

        .bottom-toolbar {
            background: white;
            border-radius: 10px;
            padding: 20px;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .new-file-btn {
            padding: 10px 25px;
            background: #6c757d;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        .new-file-btn:hover {
            background: #5a6268;
        }

        @media (max-width: 600px) {
            .pages-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>PDF向き修正ツール</h1>
    <p class="subtitle">PDFの縦横の向きを簡単に修正できます</p>

    <div class="upload-area" id="uploadArea">
        <p style="font-size: 40px; margin-bottom: 10px;">📄</p>
        <p style="font-size: 18px; color: #555;">PDFファイルをドラッグ&ドロップ</p>
        <p style="color: #999; margin: 8px 0;">または</p>
        <label for="pdfFile" class="upload-btn">ファイルを選択</label>
        <input type="file" id="pdfFile" accept=".pdf">
    </div>

    <div class="progress" id="progress">
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill" style="width: 0%">0%</div>
        </div>
    </div>

    <div class="editor" id="editor">
        <div class="toolbar">
            <span class="toolbar-title">🔧 向き修正ツール</span>
            <span class="page-count" id="pageCount"></span>
            <div class="bulk-controls">
                <span class="bulk-label">全ページ一括：</span>
                <button class="bulk-btn" id="bulkRotate90">↷ 右90°</button>
                <button class="bulk-btn" id="bulkRotate180">↕ 180°</button>
                <button class="bulk-btn" id="bulkRotate270">↶ 左90°</button>
            </div>
            <button class="save-btn" id="saveBtn">💾 保存</button>
            <button class="reset-btn" id="resetAllBtn">↺ リセット</button>
        </div>

        <div class="info-box">
            💡 <strong>使い方：</strong>
            各ページの回転ボタンで向きを調整できます。「全ページ一括」ボタンですべてのページを同時に回転することもできます。修正後は「保存」ボタンでダウンロード。
        </div>

        <div class="pages-grid" id="pagesGrid"></div>

        <div class="bottom-toolbar">
            <button class="save-btn" id="saveBtn2">💾 修正して保存</button>
            <button class="new-file-btn" id="newFileBtn">🔄 別のファイルを開く</button>
        </div>
    </div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

let pdfJsDoc = null;
let pdfBytes = null;
let totalPages = 0;
let rotations = {};

const uploadArea = document.getElementById('uploadArea');
const pdfFileInput = document.getElementById('pdfFile');
const editor = document.getElementById('editor');
const pagesGrid = document.getElementById('pagesGrid');
const pageCountEl = document.getElementById('pageCount');
const progress = document.getElementById('progress');
const progressFill = document.getElementById('progressFill');

// Upload
uploadArea.addEventListener('dragover', e => {
    e.preventDefault();
    uploadArea.classList.add('dragover');
});
uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
uploadArea.addEventListener('drop', e => {
    e.preventDefault();
    uploadArea.classList.remove('dragover');
    const f = e.dataTransfer.files[0];
    if (f && f.type === 'application/pdf') loadPDF(f);
});
pdfFileInput.addEventListener('change', e => {
    if (e.target.files[0]) loadPDF(e.target.files[0]);
});

async function loadPDF(file) {
    showProgress(10, 'PDFを読み込み中...');
    try {
        const buf = await file.arrayBuffer();
        pdfBytes = buf;
        pdfJsDoc = await pdfjsLib.getDocument({data: buf}).promise;
        totalPages = pdfJsDoc.numPages;
        rotations = {};

        uploadArea.style.display = 'none';
        editor.style.display = 'block';
        pageCountEl.textContent = `全 ${totalPages} ページ`;

        await renderAllPages();
        hideProgress();
    } catch (e) {
        alert('読み込みエラー: ' + e.message);
        hideProgress();
    }
}

async function renderAllPages() {
    pagesGrid.innerHTML = '';
    for (let i = 1; i <= totalPages; i++) {
        showProgress(Math.round((i / totalPages) * 80) + 10);
        const card = await createPageCard(i);
        pagesGrid.appendChild(card);
    }
}

async function createPageCard(pageNum) {
    const page = await pdfJsDoc.getPage(pageNum);
    const vp = page.getViewport({scale: 0.6});

    const card = document.createElement('div');
    card.className = 'page-card';
    card.id = `card-${pageNum}`;

    const label = document.createElement('div');
    label.className = 'page-label';
    label.textContent = `ページ ${pageNum}`;

    const badge = document.createElement('div');
    badge.className = 'rotation-badge';
    badge.id = `badge-${pageNum}`;
    badge.textContent = '変更なし';

    const wrapper = document.createElement('div');
    wrapper.className = 'canvas-wrapper';
    wrapper.style.height = vp.height + 'px';

    const canvas = document.createElement('canvas');
    canvas.id = `canvas-${pageNum}`;
    canvas.width = vp.width;
    canvas.height = vp.height;
    canvas.className = 'page-canvas';

    await page.render({
        canvasContext: canvas.getContext('2d'),
        viewport: vp
    }).promise;
    wrapper.appendChild(canvas);

    const btnGroup = document.createElement('div');
    btnGroup.className = 'btn-group';
    btnGroup.innerHTML = `
        <button class="rotate-btn" onclick="rotatePage(${pageNum}, 90)">↷ 右90°</button>
        <button class="rotate-btn" onclick="rotatePage(${pageNum}, 180)">↕ 180°</button>
        <button class="rotate-btn" onclick="rotatePage(${pageNum}, 270)">↶ 左90°</button>
        <button class="reset-page-btn" onclick="resetPage(${pageNum})">✕ リセット</button>
    `;

    card.appendChild(label);
    card.appendChild(badge);
    card.appendChild(wrapper);
    card.appendChild(btnGroup);
    return card;
}

window.rotatePage = function(pageNum, degrees) {
    rotations[pageNum] = ((rotations[pageNum] || 0) + degrees) % 360;
    updateCardVisual(pageNum);
};

window.resetPage = function(pageNum) {
    delete rotations[pageNum];
    updateCardVisual(pageNum);
};

function updateCardVisual(pageNum) {
    const canvas = document.getElementById(`canvas-${pageNum}`);
    const badge = document.getElementById(`badge-${pageNum}`);
    const card = document.getElementById(`card-${pageNum}`);
    const deg = rotations[pageNum] || 0;

    canvas.style.transform = `rotate(${deg}deg)`;

    const wrapper = canvas.parentElement;
    if (deg === 90 || deg === 270) {
        wrapper.style.height = canvas.width + 'px';
    } else {
        wrapper.style.height = canvas.height + 'px';
    }

    if (deg === 0) {
        badge.textContent = '変更なし';
        badge.className = 'rotation-badge';
        card.className = 'page-card';
    } else {
        badge.textContent = `${deg}° 回転`;
        badge.className = 'rotation-badge changed';
        card.className = 'page-card rotated';
    }
}

// Bulk rotation
document.getElementById('bulkRotate90').addEventListener('click', () => {
    for (let i = 1; i <= totalPages; i++) {
        rotatePage(i, 90);
    }
});

document.getElementById('bulkRotate180').addEventListener('click', () => {
    for (let i = 1; i <= totalPages; i++) {
        rotatePage(i, 180);
    }
});

document.getElementById('bulkRotate270').addEventListener('click', () => {
    for (let i = 1; i <= totalPages; i++) {
        rotatePage(i, 270);
    }
});

// Reset all
document.getElementById('resetAllBtn').addEventListener('click', () => {
    if (!confirm('すべてのページの回転をリセットしますか？')) return;
    rotations = {};
    for (let i = 1; i <= totalPages; i++) updateCardVisual(i);
});

// Save
async function savePDF() {
    const hasChanges = Object.keys(rotations).some(k => rotations[k] !== 0);
    if (!hasChanges) {
        alert('回転されたページがありません。');
        return;
    }

    showProgress(10);
    try {
        const doc = await PDFLib.PDFDocument.load(pdfBytes);
        const pages = doc.getPages();

        Object.keys(rotations).forEach(k => {
            const deg = rotations[k];
            if (deg !== 0) {
                const page = pages[parseInt(k) - 1];
                const current = page.getRotation().angle;
                page.setRotation(PDFLib.degrees((current + deg) % 360));
            }
        });

        showProgress(70);
        const saved = await doc.save();
        download(saved, 'rotated.pdf');
        showProgress(100);
        setTimeout(hideProgress, 500);
        alert('✅ 修正済みPDFをダウンロードしました！');
    } catch (e) {
        alert('保存エラー: ' + e.message);
        hideProgress();
    }
}

document.getElementById('saveBtn').addEventListener('click', savePDF);
document.getElementById('saveBtn2').addEventListener('click', savePDF);
document.getElementById('newFileBtn').addEventListener('click', () => location.reload());

function showProgress(pct) {
    progress.style.display = 'block';
    progressFill.style.width = pct + '%';
    progressFill.textContent = pct + '%';
}

function hideProgress() {
    progress.style.display = 'none';
}

function download(bytes, name) {
    const blob = new Blob([bytes], {type: 'application/pdf'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = name;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
}
</script>
</body>
</html>
